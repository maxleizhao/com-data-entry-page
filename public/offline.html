<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6fb; color: #1f2937; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .offline-message { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 480px; text-align: center; }
    h1 { margin-bottom: 1rem; font-size: 1.8rem; }
    p { margin-bottom: 1rem; color: #4b5563; }
    a { display: inline-block; padding: 0.75rem 1.25rem; background: #4361ee; color: white; border-radius: 8px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="offline-message">
    <h1>You are offline</h1>
    <p>This page is not available while offline unless it has already been loaded and cached earlier.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
